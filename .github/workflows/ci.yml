name: CI/CD

# Runs on every push to main.
# Commit message prefixes control the version bump (conventional commits):
#   fix: anything  →  patch  (1.0.X)
#   feat: anything →  minor  (1.X.0)
#   feat!: / BREAKING CHANGE  →  major  (X.0.0)
#   anything else  →  patch  (default)
#
# Required repository secrets (Settings → Secrets and variables → Secrets):
#   JWT_SECRET     — Fastify JWT signing secret
#   DB_PASSWORD    — PostgreSQL password
#   KUBECONFIG_B64 — base64-encoded kubeconfig  (`base64 ~/.kube/config`)
#
# Optional repository variable (Settings → Secrets and variables → Variables):
#   NEXT_PUBLIC_API_URL — defaults to https://api.festpage.com

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # lint only on PRs

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/festpage

jobs:
  # ─── Type check (PRs + main) ────────────────────────────────────────────────
  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─── Auto-tag (main only) ───────────────────────────────────────────────────
  version:
    name: Create version tag
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}         # e.g. v1.2.3
      version: ${{ steps.tag.outputs.new_version }} # e.g. 1.2.3
    steps:
      - uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  # ─── Build & push images (parallel) ─────────────────────────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, admin, api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.app }}:${{ needs.version.outputs.tag }}
            ${{ env.IMAGE_BASE }}/${{ matrix.app }}:latest
          # NEXT_PUBLIC_API_URL is only used by web + admin Dockerfiles; api ignores it.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.festpage.com' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ─── Package & push Helm chart to OCI registry ──────────────────────────────
  chart:
    name: Package Helm chart
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push
        run: |
          helm dep build helm/festpage
          helm package helm/festpage \
            --version "${{ needs.version.outputs.version }}" \
            --app-version "${{ needs.version.outputs.tag }}"
          helm push "festpage-${{ needs.version.outputs.version }}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [version, chart]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://festpage.com
    steps:
      - uses: azure/setup-helm@v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install festpage \
            oci://ghcr.io/${{ github.repository_owner }}/charts/festpage \
            --version "${{ needs.version.outputs.version }}" \
            --namespace festpage \
            --create-namespace \
            --set web.image.repository="${{ env.IMAGE_BASE }}/web" \
            --set web.image.tag="${{ needs.version.outputs.tag }}" \
            --set admin.image.repository="${{ env.IMAGE_BASE }}/admin" \
            --set admin.image.tag="${{ needs.version.outputs.tag }}" \
            --set api.image.repository="${{ env.IMAGE_BASE }}/api" \
            --set api.image.tag="${{ needs.version.outputs.tag }}" \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --set postgresql.auth.password="${{ secrets.DB_PASSWORD }}" \
            --atomic \
            --timeout 5m
