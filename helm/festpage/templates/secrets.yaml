apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "festpage.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required — pass --set secrets.jwtSecret=<value>" .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:5432/%s"
    .Values.postgresql.auth.username
    (required "postgresql.auth.password is required — pass --set postgresql.auth.password=<value>" .Values.postgresql.auth.password)
    (include "festpage.postgresHost" .)
    .Values.postgresql.auth.database | quote }}
