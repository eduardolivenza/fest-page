apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: festpage
spec:
  selector:
    app: admin
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: festpage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: festpage/admin:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: https://api.festpage.com
          readinessProbe:
            httpGet:
              path: /login
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: '128Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '250m'
