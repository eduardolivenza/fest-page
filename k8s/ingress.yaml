apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: festpage-ingress
  namespace: festpage
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - festpage.com
        - api.festpage.com
        - admin.festpage.com
      secretName: festpage-tls
  rules:
    - host: festpage.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 3000
    - host: api.festpage.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 3001
    - host: admin.festpage.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 3002
