services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: festpage
      POSTGRES_USER: festpage
      POSTGRES_PASSWORD: festpage_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U festpage']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://festpage:festpage_dev@postgres:5432/festpage
      JWT_SECRET: dev-super-secret-jwt-key
      WEB_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3002
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3002:3002'
    depends_on:
      - api

volumes:
  postgres_data:
